[package]
name = "uart_hello"
version = "0.1.0"
edition = "2024"
description = "WS63 UART hello-world example (prints over UART0)"
license = "MIT"

[[bin]]
name = "uart_hello"
path = "src/main.rs"

[dependencies]
ws63-pac = { path = "../../ws63-pac" }
ws63-hal = { path = "../../ws63-hal" }
ws63-rt  = { path = "../../ws63-rt" }
riscv = "0.13"

[profile.release]
opt-level = "s"
lto = true
